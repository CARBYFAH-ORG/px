<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Actividades · FA-2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- Estilos -->
<link rel="stylesheet" href="css/styles.css">

<!-- Libs externas -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <img class="logo" src="logo.png" alt="" onerror="this.style.display='none'">
    <h1>Actividades</h1>
    <p class="sub">FA-2 · Inteligencia y Análisis</p>
    <form id="login-form">
      <label>Usuario</label>
      <input id="login-user" required autocomplete="username">
      <label>Contraseña</label>
      <input id="login-pass" type="password" required autocomplete="current-password">
      <button id="login-btn" type="submit">Ingresar</button>
      <div class="login-err" id="login-err"></div>
      <div class="login-hint">Acceso reservado al personal del FA-2</div>
    </form>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <aside class="sidebar">
    <div class="brand">
      <img src="logo.png" alt="" onerror="this.style.display='none'">
      <div><b>ACTIVIDADES</b><span>FA-2</span></div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sfoot">
      <div class="who" id="sf-who"></div>
      <div class="rol" id="sf-rol"></div>
      <button class="btn-logout" id="btn-logout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Salir
      </button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <button class="menubtn" id="menubtn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h2 id="topbar-title">Dashboard</h2>
      <div class="spacer"></div>
    </header>
    <main class="content" id="content"></main>
  </div>
</div>

<div class="modal-bg" id="modal-bg"></div>
<div class="fullload" id="fullload"><div class="spinner"></div></div>
<div id="toasts"></div>

<!-- Scripts (orden importa) -->
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/router.js"></script>
<script src="js/notificaciones.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/lista.js"></script>
<script src="js/kanban.js"></script>
<script src="js/calendario.js"></script>
<script src="js/ficha.js"></script>
<script src="js/usuarios.js"></script>
<script src="js/app.js"></script>
</body>
</html>
